# Подстановка ${...} из файла .env в корне проекта (см. .env.example). Секреты не зашивать в этот файл.
name: node-express-stack

services:
  postgres:
    build:
      context: ./docker/postgres
    image: ${DOCKERHUB_USER:-local}/node-express-postgres:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    restart: on-failure
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - '${POSTGRES_PORT:-5432}:5432'

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: development
    image: ${DOCKERHUB_USER:-local}/node-express-app:${IMAGE_TAG:-latest}
    environment:
      PORT: ${APP_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${APP_PORT:-4000}:${APP_PORT:-4000}'
    volumes:
      # В dev режиме монтируем весь проект, чтобы миграции можно было запускать в контейнере.
      - ./:/usr/src/app
      - /usr/src/app/node_modules
      - app_logs:/usr/src/app/logs
    networks:
      - app_net
    restart: on-failure

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_LISTEN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  app_logs:
  pgadmin_data:

networks:
  app_net:
    driver: bridge
